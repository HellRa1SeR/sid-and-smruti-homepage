name: Update gallery manifest

on:
  push:
    branches: [main, master]
    paths:
      - "images/gallery/**"
      - "scripts/generate-gallery.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate manifest
        run: python scripts/generate-gallery.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/gallery/manifest.json js/gallery-data.js
          if git diff --staged --quiet; then
            echo "Gallery data is already up to date"
          else
            git commit -m "chore: update gallery manifest"
            git push
          fi
